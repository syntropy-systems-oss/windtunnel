name: Feature proposal
description: Propose a focused improvement to Wind Tunnel
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What agent-testing problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful public behavior or contract.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What can users do today, and why is it insufficient?
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - Public API or SPI
        - CLI
        - Runtime or plugin integration
        - Scenario authoring
        - Reports or artifacts
        - Documentation or contributor tooling
        - Not sure
    validations:
      required: true
  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I would be willing to help implement or test this change.
