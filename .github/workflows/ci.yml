name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Install
        run: uv sync
      - name: Generated agent skill is current
        run: |
          uv run --group docs python scripts/build_agent_skill.py
          git diff --exit-code
      - name: Lockfile is current (uv lock --check)
        run: uv lock --check
      - name: Lint
        run: uv run ruff check windtunnel/ tests/ scripts/
      - name: Type check
        run: uv run mypy windtunnel
      - name: Unit tests (no infrastructure required)
        run: uv run pytest -m "not integration" -q --timeout=120

  python-compatibility:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: uv sync
      - name: Unit tests
        run: uv run pytest -m "not integration" -q --timeout=120

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Build docs (strict — broken nav/links fail)
        run: uv run --group docs mkdocs build --strict
