name: Release Please

on:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # release-please bumps pyproject.toml on its PR branch but knows nothing
      # about uv.lock, so every release used to leave the lockfile one version
      # behind (and every subsequent `uv run` tried to sync it as a side
      # effect). Re-lock on the release PR branch here, in the same run — a
      # separate workflow can't do it because pushes made with GITHUB_TOKEN
      # never trigger other workflows (the same recursion guard the publish
      # job below works around).
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.pr }}
        with:
          ref: ${{ fromJson(steps.release.outputs.pr).headBranchName }}
      - uses: astral-sh/setup-uv@v5
        if: ${{ steps.release.outputs.pr }}
      - name: Sync uv.lock with the release version bump
        if: ${{ steps.release.outputs.pr }}
        run: |
          uv lock
          if ! git diff --quiet uv.lock; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add uv.lock
            git commit -m "chore: sync uv.lock with release version"
            git push
          fi

  # Publish runs in the SAME workflow run, gated on release-please having just
  # cut a release. It deliberately does NOT listen for the `release: published`
  # event: release-please creates that release with the default GITHUB_TOKEN,
  # and GitHub refuses to trigger workflows from GITHUB_TOKEN-authored events
  # (recursion guard). A separate publish workflow therefore never fires for a
  # bot-cut release — which is exactly how v0.4.0 got tagged but never reached
  # PyPI. Chaining the job here sidesteps that entirely.
  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    # Trusted Publishing (OIDC) — no API token. The PyPI project must list this
    # repo + workflow (release-please.yml) + environment as a trusted publisher
    # (see CONTRIBUTING.md "One-time repository setup").
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Build sdist and wheel
        run: uv build
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
